<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คำใบ้ - Selfie Vocab Run</title>
<style>
  :root {
    --navy: #1F3864;
    --gold: #D4A017;
    --easy: #2E7D32;
    --medium: #B8860B;
    --hard: #C0392B;
    --bg: #F4F6FB;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Leelawadee UI", "Tahoma", "Segoe UI", sans-serif;
    background: var(--bg);
    color: #1a1a2e;
  }
  header {
    background: var(--navy);
    color: #fff;
    padding: 1.4em 1.2em 1.2em;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 5;
  }
  header h1 { margin: 0 0 0.15em; font-size: 1.5rem; }
  header p { margin: 0; font-size: 0.85rem; color: #C9D6EE; }

  .notice {
    background: #FFF4D6;
    border-bottom: 2px solid var(--gold);
    color: #6B4E00;
    text-align: center;
    padding: 0.7em 1em;
    font-size: 0.9rem;
    font-weight: 600;
  }

  /* ---------- Group picker ---------- */
  .group-select {
    background: #fff;
    border-bottom: 1px solid #e2e6ef;
    padding: 1em 1em 1.2em;
    text-align: center;
  }
  .group-select-label { font-weight: 700; color: var(--navy); font-size: 0.95rem; margin-bottom: 0.7em; }
  .group-buttons {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
    gap: 0.5em;
    max-width: 640px;
    margin: 0 auto;
  }
  .group-buttons button {
    border: 2px solid var(--navy);
    background: #fff;
    color: var(--navy);
    font-weight: 700;
    font-size: 0.95rem;
    padding: 0.65em 0.4em;
    border-radius: 12px;
    cursor: pointer;
  }
  .group-buttons button.active { background: var(--navy); color: #fff; }

  .group-active-bar {
    display: none;
    background: #EAF3EA;
    border-bottom: 1px solid #cfe4cf;
    color: #1e5c1e;
    text-align: center;
    padding: 0.6em 1em;
    font-size: 0.9rem;
  }
  .group-active-bar b { color: #0f3d0f; }
  .group-active-bar button {
    margin-left: 0.6em;
    border: none;
    background: none;
    color: var(--navy);
    text-decoration: underline;
    font-size: 0.85rem;
    cursor: pointer;
    font-weight: 700;
  }
  .group-active-bar button:disabled { opacity: 0.5; text-decoration: none; cursor: default; }

  .config-warning {
    background: #FDECEC; border-bottom: 2px solid #C0392B; color: #8a1f1f;
    text-align: center; padding: 0.8em 1em; font-size: 0.85rem; font-weight: 600;
    display: none;
  }

  .filters {
    display: flex;
    gap: 0.5em;
    justify-content: center;
    flex-wrap: wrap;
    padding: 1em;
  }
  .filters button {
    border: 1px solid #ccc;
    background: #fff;
    border-radius: 100px;
    padding: 0.45em 1.1em;
    font-size: 0.85rem;
    cursor: pointer;
    font-weight: 600;
    color: #444;
  }
  .filters button.active { background: var(--navy); color: #fff; border-color: var(--navy); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 0.9em;
    padding: 0 1em 2.5em;
    max-width: 1200px;
    margin: 0 auto;
  }
  .card {
    background: #fff;
    border-radius: 14px;
    padding: 1em 1.1em;
    box-shadow: 0 2px 10px rgba(20,30,60,0.06);
    border-left: 6px solid var(--navy);
  }
  .card.Easy { border-left-color: var(--easy); }
  .card.Medium { border-left-color: var(--medium); }
  .card.Hard { border-left-color: var(--hard); }

  .card-no { color: #99a; font-size: 0.8rem; font-weight: 700; margin-bottom: 0.5em; }

  .clue-text { font-size: 0.95rem; line-height: 1.55; color: #333; }

  .emoji-clue { font-size: 3.2rem; text-align: center; margin: 0.3em 0; line-height: 1.2; }

  .hangman { display: flex; flex-wrap: wrap; justify-content: center; margin: 0.5em 0 0.3em; }
  .tile {
    display: inline-flex; align-items: center; justify-content: center;
    width: 1.5em; height: 1.8em; margin: 0 2px;
    border-bottom: 3px solid var(--navy);
    font-weight: 800; font-size: 1.05rem; color: #bbb;
  }
  .tile.shown { color: var(--navy); }
  .tile-gap { display: inline-block; width: 0.7em; }
  .tile-lit {
    display: inline-flex; align-items: center; justify-content: center;
    width: 1.5em; font-weight: 800; color: #aab;
  }
  .hangman-hint { font-size: 0.75rem; color: #889; text-align: center; }

  .empty { text-align: center; color: #99a; padding: 3em 1em; }

  /* ---------- Upload block (inside each card) ---------- */
  .upload-block {
    margin-top: 0.9em;
    padding-top: 0.8em;
    border-top: 1px dashed #ddd;
    text-align: center;
  }
  .file-input { display: none; }
  .upload-btn {
    display: inline-block;
    background: var(--gold);
    color: #1a1a1a;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 0.55em 1.3em;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(212,160,23,0.35);
  }
  body.no-group .upload-btn { pointer-events: none; opacity: 0.4; }
  .upload-status { margin-top: 0.5em; font-size: 0.8rem; min-height: 1.1em; }
  .upload-status.loading { color: #778; }
  .upload-status.success { color: #1e7e34; font-weight: 700; }
  .upload-status.error { color: #C0392B; font-weight: 700; }
</style>
</head>
<body class="no-group">

<header>
  <h1>📖 คำใบ้ Selfie Vocab Run</h1>
  <p>สแกน / เดา / ไปถ่ายรูป — เฉลยจะเปิดเผยตอนจบกิจกรรมเท่านั้น</p>
</header>

<div class="notice">✅ ทุกคนในกลุ่มช่วยกันถ่ายและอัปโหลดรูปได้เลย แค่เลือกกลุ่มของคุณด้านล่างก่อนเริ่ม</div>

<div class="group-select" id="groupSelect">
  <div class="group-select-label">👥 เลือกกลุ่มของคุณก่อนเริ่มอัปโหลดรูป</div>
  <div class="group-buttons" id="groupButtons">
    <button data-group="Speaking">Speaking</button>
    <button data-group="Gray">Gray</button>
    <button data-group="นางแมวป่าห์">นางแมวป่าห์</button>
    <button data-group="Buffalo Arrow">Buffalo Arrow</button>
    <button data-group="Chicken yellow">Chicken yellow</button>
    <button data-group="Green">Green</button>
  </div>
</div>

<div class="group-active-bar" id="groupActiveBar">
  ✅ กำลังอัปโหลดในนาม <b id="activeGroupName"></b>
  <button id="btnChangeGroup">เปลี่ยนกลุ่ม</button>
  <button id="btnRefreshStatus">🔄 เช็คสถานะล่าสุด</button>
</div>

<div class="config-warning" id="configWarning"></div>

<div class="filters" id="filters">
  <button data-f="all" class="active">ทั้งหมด</button>
  <button data-f="Easy">🟢 ง่าย</button>
  <button data-f="Medium">🟡 กลาง</button>
</div>

<div class="grid" id="grid"></div>
<div class="empty" id="emptyMsg" style="display:none;">ไม่มีคำใบ้ในหมวดนี้</div>

<script>
  // =====================================================================
  // CONFIG — วาง Web app URL ของ Google Apps Script (PhotoUpload.gs) ตรงนี้
  // =====================================================================
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyEnmal5FsBRWO8wo0knf1R5AXeN4hCeSntE_tcXYLak9NcIRhbu7ybTw7QgP3untc/exec";

  // =====================================================================
  // CONFIG — ลิงก์ CSV ของชีตเดียวกับที่ screen.html ใช้ (แท็บ Form_Responses)
  // ใช้แค่ "อ่าน" เพื่อเช็คว่ากลุ่มนี้เคยอัปโหลดข้อไหนไปแล้วบ้าง (จากอุปกรณ์ไหนก็ได้)
  // ไม่ต้องตั้งค่าเพิ่ม เพราะเป็นลิงก์เดียวกับใน screen.html อยู่แล้ว
  // =====================================================================
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSovYsD4AM1mfIiCtuORyPXzRgOpvDZ1F5bXQNsNnbWnGXJdlUWrAL588t7rELGDc_bXM9tBNnvNbk7/pub?gid=1054791757&single=true&output=csv";

  // =====================================================================
  // คำใบ้ 32 ข้อ — จงใจ "ไม่" ใส่ชื่อสถานที่/คำศัพท์คำตอบไว้ในหน้านี้
  // (เฉลยเต็มอยู่ในไฟล์ screen.html แท็บ "เฉลย" สำหรับครูเท่านั้น)
  // รูปแบบ (type): "riddle" = คำใบ้ข้อความ, "emoji" = ทายจากอิโมจิล้วน,
  //                "hangman" = ทายตัวอักษรทีละตัว (คำตอบถูกซ่อนไว้ในโค้ด
  //                เพื่อใช้เฉลยทีละตัวเมื่อกด — เป็นกลไกของเกมโดยตรง)
  // =====================================================================
  const clues = [
    [1,  "Easy",   "riddle",  "🫂 ALL CREW MEMBERS (ANYWHERE) — get your WHOLE group together and take ONE big photo with EVERYONE. You can do this ANYWHERE in the school!"],
    [2,  "Easy",   "hangman", "CANTEEN"],
    [3,  "Easy",   "riddle",  "Every Monday, everyone stands here to sing the national anthem. Stand next to it like a soldier!"],
    [4,  "Easy",   "emoji",   "🚰"],
    [5,  "Easy",   "riddle",  "You walk up and down this every day — there is still no elevator! Pose like a superhero climbing up."],
    [6,  "Easy",   "riddle",  "This is the first thing you see when you arrive at school. Point at it and smile like a tour guide!"],
    [7,  "Easy",   "riddle",  "Teachers park their cars here. Stand here and pretend you are parking a car."],
    [8,  "Easy",   "emoji",   "🌳"],
    [9,  "Easy",   "hangman", "LIBRARY"],
    [10, "Medium", "riddle",  "If you feel sick at school, you come here. Pretend you have a headache and need help!"],
    [11, "Medium", "riddle",  "The guard sits here and always knows if you are late! Give a big, serious salute."],
    [12, "Easy",   "hangman", "BASKETBALL COURT"],
    [13, "Easy",   "riddle",  "This small garden has flowers and plants. Smell a flower like it is expensive perfume!"],
    [14, "Easy",   "riddle",  "You can hear singing and music from this room. Pretend to play the guitar like a rock star!"],
    [15, "Medium", "riddle",  "This big room is where camp started today. Stand here like a camp leader giving a speech!"],
    [16, "Easy",   "hangman", "COMPUTER ROOM"],
    [17, "Medium", "riddle",  "This board has papers and news on it. Point at it like you read everything on it!"],
    [18, "Medium", "riddle",  "This is the school director's office. Some students feel a little scared here! Look worried outside the door."],
    [19, "Easy",   "riddle",  "You buy snacks and drinks here. Look super happy, like you just won free snacks!"],
    [20, "Easy",   "riddle",  "You leave your shoes here before going into some rooms. Hold up one shoe like it is very special!"],
    [21, "Easy",   "emoji",   "🔔"],
    [22, "Easy",   "riddle",  "You sit here to watch and cheer for school sports. Stand up and cheer loudly like your team just won!"],
    [23, "Easy",   "riddle",  "You wear safety glasses and do experiments here. Pretend you just made an amazing discovery!"],
    [24, "Easy",   "riddle",  "You draw and paint pictures in this room. Strike your best 'famous artist' pose!"],
    [25, "Medium", "riddle",  "Teachers rest here between classes. Peek inside like a curious detective!"],
    [26, "Easy",   "riddle",  "You wait here for your parents or the school bus at pickup time. Wave and smile like you're excited to go home! (Stay inside the school gate — this is the safe waiting area only.)"],
    [27, "Easy",   "riddle",  "This shady place is for resting between classes. Sit down and relax like you are on vacation!"],
    [28, "Medium", "riddle",  "The morning announcements come from this room every day. Pretend you are a TV news reporter!"],
    [29, "Medium", "riddle",  "This red tool is used to stop fires. We hope no one ever needs it! Give it a respectful salute, just in case."],
    [30, "Medium", "hangman", "MOTTO SIGN"],
    [31, "Easy",   "emoji",   "🐕"],
    [32, "Easy",   "riddle",  "Find any teacher at school and take a group photo together. Ask nicely and say thank you!"]
  ];

  const grid = document.getElementById('grid');
  const emptyMsg = document.getElementById('emptyMsg');
  const configWarning = document.getElementById('configWarning');

  let currentGroup = null;
  let currentFilter = 'all';
  const uploadState = {}; // { [no]: { status: 'loading'|'success'|'error', message: string } }

  if (!WEBAPP_URL || WEBAPP_URL.includes("PASTE_YOUR")) {
    configWarning.style.display = 'block';
    configWarning.textContent = "⚠️ ยังไม่ได้ตั้งค่า WEBAPP_URL ในไฟล์นี้ — ครูต้องตั้งค่า Google Apps Script ก่อนใช้งาน (ดู PhotoUpload.gs)";
  }

  // เผยตัวอักษรครึ่งหนึ่งของแต่ละคำโดยอัตโนมัติ (ตัวแรกของทุกคำจะถูกเผยเสมอ)
  // เพื่อให้พอเดาคำตอบได้โดยไม่ต้องกดอะไรเพิ่ม
  function renderHangman(word) {
    let tiles = "";
    let idx = 0;
    for (const ch of word) {
      if (ch === " ") {
        tiles += `<span class="tile-gap"></span>`;
        idx = 0; // เริ่มนับตัวอักษรใหม่ทุกคำ ให้ตัวแรกของแต่ละคำถูกเผยเสมอ
      } else if (/[a-zA-Z]/.test(ch)) {
        const shown = idx % 2 === 0;
        tiles += `<span class="tile${shown ? ' shown' : ''}">${shown ? ch : "_"}</span>`;
        idx++;
      } else {
        tiles += `<span class="tile-lit">${ch}</span>`;
      }
    }
    return `<div class="hangman">${tiles}</div>`;
  }

  function statusHtml(no) {
    const s = uploadState[no];
    if (!s) return '<div class="upload-status" id="uploadStatus-' + no + '"></div>';
    return `<div class="upload-status ${s.status}" id="uploadStatus-${no}">${s.message}</div>`;
  }

  function render(filter) {
    currentFilter = filter;
    grid.innerHTML = "";
    const items = clues.filter(c => filter === 'all' || c[1] === filter);
    emptyMsg.style.display = items.length ? 'none' : 'block';
    for (const [no, level, type, content] of items) {
      const card = document.createElement('div');
      card.className = `card ${level}`;
      let body = "";
      if (type === "emoji") body = `<div class="emoji-clue">${content}</div>`;
      else if (type === "hangman") body = renderHangman(content);
      else body = `<div class="clue-text">${content}</div>`;

      card.innerHTML = `
        <div class="card-no">ข้อที่ ${no}</div>
        ${body}
        <div class="upload-block">
          <input type="file" accept="image/*" class="file-input" id="file-${no}" data-no="${no}">
          <label for="file-${no}" class="upload-btn">📷 อัปโหลดรูป</label>
          ${statusHtml(no)}
        </div>`;
      grid.appendChild(card);
    }
  }

  document.getElementById('filters').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.f);
  });

  render('all');

  // =====================================================================
  // เลือกกลุ่ม — เลือกครั้งเดียว ใช้กับการอัปโหลดทุกข้อจนกว่าจะกด "เปลี่ยนกลุ่ม"
  // (สมาชิกคนไหนในกลุ่มก็อัปโหลดได้ ไม่ต้องเป็นตัวแทนคนเดียวเหมือนเดิม)
  // =====================================================================
  const groupSelect = document.getElementById('groupSelect');
  const groupActiveBar = document.getElementById('groupActiveBar');
  const activeGroupName = document.getElementById('activeGroupName');

  document.getElementById('groupButtons').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    currentGroup = btn.dataset.group;
    activeGroupName.textContent = currentGroup;
    groupSelect.style.display = 'none';
    groupActiveBar.style.display = 'block';
    document.body.classList.remove('no-group');
    refreshUploadStatus();
  });

  document.getElementById('btnChangeGroup').addEventListener('click', () => {
    groupSelect.style.display = 'block';
    groupActiveBar.style.display = 'none';
  });

  document.getElementById('btnRefreshStatus').addEventListener('click', refreshUploadStatus);

  // =====================================================================
  // เช็คสถานะว่ากลุ่มที่เลือกอัปโหลดข้อไหนไปแล้วบ้าง (อ่านจากชีตจริง ไม่ใช่แค่
  // ความจำในเครื่อง) — เผื่อกรณีเพื่อนคนอื่นในกลุ่มอัปโหลดจากมือถือเครื่องอื่นไปแล้ว
  // จะได้ไม่ต้องเดา/อัปซ้ำ กดปุ่ม "เช็คสถานะล่าสุด" หรือกดเลือกกลุ่มใหม่เพื่อรีเฟรช
  // =====================================================================
  let statusCheckInFlight = false;
  const btnRefreshStatus = document.getElementById('btnRefreshStatus');

  async function refreshUploadStatus() {
    if (!currentGroup) return;
    if (!SHEET_CSV_URL || SHEET_CSV_URL.includes("PASTE_YOUR")) return;
    if (statusCheckInFlight) return;
    statusCheckInFlight = true;
    const originalLabel = btnRefreshStatus.textContent;
    btnRefreshStatus.disabled = true;
    btnRefreshStatus.textContent = '🔄 กำลังเช็ค...';
    try {
      const res = await fetch(SHEET_CSV_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const rows = parseCSV(text);
      if (rows.length < 2) return;
      const headers = rows[0].map(h => h.trim());
      const groupCol = findCol(headers, ["ชื่อกลุ่ม", "กลุ่ม"]);
      const dataRows = rows.slice(1).filter(r => r.some(c => c && c.trim() !== ""));
      const myRow = dataRows.find(r => (r[groupCol] || "").trim() === currentGroup);
      if (!myRow) return; // กลุ่มนี้ยังไม่เคยอัปโหลดอะไรเลยในชีต — ไม่มีอะไรต้องอัปเดต
      for (const [no] of clues) {
        if (uploadState[no] && uploadState[no].status === 'loading') continue; // ไม่ทับสถานะที่กำลังอัปโหลดอยู่
        const colIdx = findExactCol(headers, "SVR#" + no);
        if (colIdx < 0) continue;
        const cell = (myRow[colIdx] || "").trim();
        if (cell) setStatus(no, 'success', '✅ มีรูปอัปโหลดแล้ว');
      }
    } catch (err) {
      console.error('refreshUploadStatus failed', err);
    } finally {
      statusCheckInFlight = false;
      btnRefreshStatus.disabled = false;
      btnRefreshStatus.textContent = originalLabel;
    }
  }

  function parseCSV(text) {
    const rows = [];
    let row = [], field = "", inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i], next = text[i + 1];
      if (inQuotes) {
        if (c === '"' && next === '"') { field += '"'; i++; }
        else if (c === '"') { inQuotes = false; }
        else { field += c; }
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ',') { row.push(field); field = ""; }
        else if (c === '\r') { /* skip */ }
        else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ""; }
        else field += c;
      }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows.filter(r => r.length > 1 || (r.length === 1 && r[0] !== ""));
  }
  function findCol(headers, keywords) {
    for (const k of keywords) {
      const idx = headers.findIndex(h => h === k);
      if (idx >= 0) return idx;
    }
    return headers.findIndex(h => keywords.some(k => h.includes(k)));
  }
  // จับคู่ชื่อคอลัมน์แบบ "ตรงเป๊ะ" — ใช้กับ SVR#1..SVR#32 เท่านั้น เพื่อไม่ให้
  // "SVR#1" ไปจับคอลัมน์ "SVR#10"-"SVR#19" ผิดพลาดจากการเทียบแบบ includes()
  function findExactCol(headers, name) {
    return headers.findIndex(h => h.trim() === name);
  }

  // =====================================================================
  // บีบอัดรูปในเครื่องก่อนส่ง (ลดขนาดไฟล์ให้เล็กพอส่งผ่านเน็ตโรงเรียนได้เร็ว
  // และไม่ชนขีดจำกัดขนาดข้อมูลของ Google Apps Script)
  // =====================================================================
  function compressImage(file, maxDim, quality) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error("อ่านไฟล์ไม่สำเร็จ"));
      reader.onload = (e) => {
        const img = new Image();
        img.onerror = () => reject(new Error("เปิดไฟล์รูปไม่สำเร็จ"));
        img.onload = () => {
          let { width, height } = img;
          if (width > maxDim || height > maxDim) {
            if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
            else { width = Math.round(width * maxDim / height); height = maxDim; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve(dataUrl.split(',')[1]);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function setStatus(no, status, message) {
    uploadState[no] = { status, message };
    const el = document.getElementById(`uploadStatus-${no}`);
    if (el) {
      el.textContent = message;
      el.className = 'upload-status ' + status;
    }
  }

  async function handleFileSelect(no, file) {
    if (!currentGroup) { alert('กรุณาเลือกกลุ่มก่อนอัปโหลดรูป'); return; }
    if (!WEBAPP_URL || WEBAPP_URL.includes("PASTE_YOUR")) {
      alert('ยังไม่ได้ตั้งค่า WEBAPP_URL ในไฟล์นี้ — แจ้งครูให้ตั้งค่าก่อนใช้งาน');
      return;
    }
    if (uploadState[no] && uploadState[no].status === 'loading') return; // กันกดซ้ำระหว่างอัปโหลด

    setStatus(no, 'loading', 'กำลังบีบอัดรูป...');
    try {
      const base64 = await compressImage(file, 1280, 0.72);
      setStatus(no, 'loading', 'กำลังอัปโหลด...');

      // หมายเหตุสำคัญ: ห้ามใส่ header "Content-Type: application/json" เอง
      // เพราะจะทำให้ browser ส่ง OPTIONS preflight request ซึ่ง Google Apps Script
      // Web App ไม่รองรับ ปล่อยให้ fetch ใช้ content-type เริ่มต้น (text/plain) แทน
      const res = await fetch(WEBAPP_URL, {
        method: 'POST',
        body: JSON.stringify({
          group: currentGroup,
          itemNo: no,
          filename: `SVR${no}_${currentGroup}_${Date.now()}.jpg`,
          mimeType: 'image/jpeg',
          imageBase64: base64
        })
      });
      const data = await res.json();
      if (data.status === 'ok') {
        setStatus(no, 'success', '✅ อัปโหลดสำเร็จ (อัปโหลดใหม่ได้ถ้าอยากเปลี่ยนรูป)');
      } else {
        throw new Error(data.message || 'ไม่ทราบสาเหตุ');
      }
    } catch (err) {
      console.error(err);
      setStatus(no, 'error', '❌ อัปโหลดไม่สำเร็จ ลองใหม่อีกครั้ง (' + err.message + ')');
    }
  }

  grid.addEventListener('change', (e) => {
    const input = e.target.closest('.file-input');
    if (!input || !input.files || !input.files.length) return;
    const no = parseInt(input.dataset.no, 10);
    handleFileSelect(no, input.files[0]);
  });
</script>
</body>
