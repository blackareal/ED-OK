<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comment - Workshop นำกิจกรรม</title>
<style>
  :root {
    --navy: #1F3864;
    --gold: #D4A017;
    --bg: #F4F6FB;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Leelawadee UI", "Tahoma", "Segoe UI", sans-serif;
    background: var(--bg);
    color: #1a1a2e;
  }
  header {
    background: var(--navy);
    color: #fff;
    padding: 2em 1.2em 1.6em;
    text-align: center;
  }
  header h1 { margin: 0 0 0.25em; font-size: clamp(1.5rem, 4vw, 2.1rem); }
  header p { margin: 0; color: #C9D6EE; font-size: 0.95rem; }
  header .event-name {
    margin-top: 0.5em;
    font-size: 0.78rem;
    color: #9fb3d9;
    letter-spacing: 0.02em;
  }

  .wrap { max-width: 640px; margin: 0 auto; padding: 1.6em 1.2em 3em; }

  .card {
    background: #fff;
    border-radius: 18px;
    padding: 1.6em 1.6em;
    box-shadow: 0 2px 14px rgba(20,30,60,0.08);
    margin-bottom: 1.4em;
  }
  .card h2 { margin: 0 0 0.7em; color: var(--navy); font-size: 1.15rem; }
  .guide-item {
    display: flex;
    align-items: flex-start;
    gap: 0.7em;
    margin-bottom: 0.9em;
    font-size: 0.95rem;
    line-height: 1.5;
  }
  .guide-item .emoji { font-size: 1.3rem; flex-shrink: 0; }
  .guide-item b { color: var(--navy); }

  .note {
    background: #FFF4D6;
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 0.9em 1.1em;
    font-size: 0.85rem;
    color: #6B4E00;
    margin-top: 0.5em;
  }

  .form-group { margin-bottom: 1.1em; }
  .form-group label {
    display: block;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 0.4em;
    font-size: 0.9rem;
  }
  .form-group select,
  .form-group textarea,
  .form-group input {
    width: 100%;
    padding: 0.7em 0.9em;
    border: 2px solid #dde3f0;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.95rem;
    background: #fff;
    color: #1a1a2e;
  }
  .form-group textarea { resize: vertical; min-height: 110px; line-height: 1.6; }
  .form-group select:focus,
  .form-group textarea:focus,
  .form-group input:focus { outline: none; border-color: var(--navy); }
  .hint-small { font-size: 0.78rem; color: #99a; margin-top: 0.3em; }

  .btn-submit {
    display: block;
    width: 100%;
    background: var(--gold);
    color: #1a1a1a;
    border: none;
    font-weight: 800;
    font-size: 1.05rem;
    padding: 0.9em;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(212,160,23,0.35);
  }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

  .submit-status {
    text-align: center;
    margin-top: 0.9em;
    font-size: 0.9rem;
    min-height: 1.2em;
  }
  .submit-status.error { color: #C0392B; font-weight: 700; }
  .submit-status.success { color: #1e7e34; font-weight: 700; }
  .submit-status.loading { color: #778; }

  .config-warning {
    background: #FDECEC; border: 1px solid #C0392B; color: #8a1f1f;
    padding: 1em; border-radius: 12px; margin-bottom: 1.2em; font-size: 0.85rem;
    display: none;
  }

  .link-secondary {
    text-align: center;
    margin-top: 1.6em;
    font-size: 0.85rem;
  }
  .link-secondary a { color: var(--navy); font-weight: 700; }

  footer.hint {
    text-align: center;
    margin-top: 2em;
    font-size: 0.8rem;
    color: #99a;
  }
</style>
</head>
<body>

<header>
  <h1>💬 Comment</h1>
  <p>Workshop การนำกิจกรรมของนักเรียนแต่ละฐาน</p>
  <p class="event-name">ค่ายพัฒนาผู้นำด้านภาษาอังกฤษ ครั้งที่ 2 · โรงเรียนอุดรพิชัยรักษ์พิทยา</p>
</header>

<div class="wrap">
  <div class="card">
    <div class="config-warning" id="configWarning"></div>
    <form id="commentForm">
      <div class="form-group">
        <label for="groupSelect">Group</label>
        <select id="groupSelect" required>
          <option value="">-- เลือกฐาน --</option>
          <option value="Recreation (Gray)">Recreation (Gray)</option>
          <option value="Vocabulary (Yellow)">Vocabulary (Yellow)</option>
          <option value="Speaking (Pink)">Speaking (Pink)</option>
          <option value="Sing&Dance (Purple)">Sing&amp;Dance (Purple)</option>
          <option value="Grammar (Green)">Grammar (Green)</option>
          <option value="Directions (Blue)">Directions (Blue)</option>
        </select>
      </div>
      <div class="form-group">
        <label for="commentText">Comment (จุดเด่น / สิ่งที่ควรพัฒนา / ให้กำลังใจ)</label>
        <textarea id="commentText" required></textarea>
      </div>
      <div class="form-group">
        <label for="commenterName">Name (Optional)</label>
        <input type="text" id="commenterName">
      </div>
      <button type="submit" class="btn-submit" id="btnSubmit">Send</button>
      <div class="submit-status" id="submitStatus"></div>
    </form>
  </div>

  <div class="link-secondary">
    นักเรียนที่ต้องการดู Comment ของฐานตัวเอง
    <br>
    <a href="feedback.html">👉 ไปหน้าดู Comment</a>
  </div>

  <footer class="hint">Workshop นำกิจกรรม · หน้าสำหรับคุณครู/วิทยากรเท่านั้น</footer>
</div>

<script>
  // =====================================================================
  // CONFIG — วาง Web app URL ของ Google Apps Script ตรงนี้
  // (ดูวิธีสร้างใน Code.gs ที่แนบมาด้วย)
  // =====================================================================
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbw32MT2LDCsnb_mxGAfVkA0xf0xtxcWMjyMC69aib4v-XKRLZP3-FZu5qLmpvDxUzmXDA/exec";

  const form = document.getElementById('commentForm');
  const groupSelect = document.getElementById('groupSelect');
  const commentText = document.getElementById('commentText');
  const commenterName = document.getElementById('commenterName');
  const btnSubmit = document.getElementById('btnSubmit');
  const submitStatus = document.getElementById('submitStatus');
  const configWarning = document.getElementById('configWarning');

  function showStatus(msg, type) {
    submitStatus.textContent = msg;
    submitStatus.className = 'submit-status ' + (type || '');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    if (!WEBAPP_URL || WEBAPP_URL.includes('PASTE_YOUR')) {
      configWarning.style.display = 'block';
      configWarning.textContent = "⚠️ ยังไม่ได้ตั้งค่า WEBAPP_URL ในไฟล์นี้ — ครูต้องตั้งค่า Google Apps Script ก่อนใช้งาน (ดู Code.gs)";
      return;
    }
    configWarning.style.display = 'none';

    const group = groupSelect.value;
    const comment = commentText.value.trim();
    const name = commenterName.value.trim();

    if (!group) { showStatus("กรุณาเลือกฐานก่อนส่ง Comment", "error"); return; }
    if (!comment) { showStatus("กรุณาเขียน Comment ก่อนส่ง", "error"); return; }

    btnSubmit.disabled = true;
    showStatus("กำลังส่ง Comment...", "loading");

    try {
      // หมายเหตุสำคัญ: ห้ามใส่ header "Content-Type: application/json" เอง
      // เพราะจะทำให้ browser ส่ง OPTIONS preflight request ซึ่ง Google Apps Script
      // Web App ไม่รองรับ ทำให้เชื่อมต่อไม่ได้ (CORS error)
      // ปล่อยให้ fetch ใช้ content-type เริ่มต้น (text/plain) แทน แล้วฝั่ง
      // Apps Script (Code.gs) จะ JSON.parse(e.postData.contents) เอาเอง
      const res = await fetch(WEBAPP_URL, {
        method: 'POST',
        body: JSON.stringify({ group, comment, name })
      });
      const data = await res.json();
      if (data.status === 'ok') {
        showStatus("✅ ส่ง Comment สำเร็จ ขอบคุณครับ/ค่ะ!", "success");
        commentText.value = '';
        commenterName.value = '';
        groupSelect.value = '';
      } else {
        throw new Error(data.message || 'ไม่ทราบสาเหตุ');
      }
    } catch (err) {
      console.error(err);
      showStatus("❌ ส่งไม่สำเร็จ ลองใหม่อีกครั้ง (" + err.message + ")", "error");
    } finally {
      btnSubmit.disabled = false;
    }
  });
</script>
</body>
</html>
